<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz 196 Drapeaux du Monde</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background-color: #eef2f3; padding: 20px; color: #333; }
        #game-box { background: white; max-width: 600px; margin: 0 auto; padding: 30px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.15); }
        #flag-container { height: 220px; display: flex; align-items: center; justify-content: center; margin-bottom: 25px; background: #fafafa; border-radius: 8px; border: 1px dashed #ccc; }
        img { max-width: 90%; max-height: 90%; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        input { padding: 15px; font-size: 20px; width: 85%; border: 2px solid #ddd; border-radius: 30px; text-align: center; transition: border-color 0.3s; margin-bottom: 10px; }
        input:focus { outline: none; border-color: #007BFF; }
        .stats { margin-bottom: 20px; font-size: 22px; font-weight: bold; color: #007BFF; }
        #message { height: 28px; margin-top: 5px; font-weight: bold; font-size: 18px; color: #28a745; }
        #progress-bar { width: 100%; background-color: #ddd; height: 10px; border-radius: 5px; margin-bottom: 20px; overflow: hidden; }
        #progress-fill { width: 0%; height: 100%; background-color: #28a745; transition: width 0.3s; }
        
        /* Nouveaux boutons */
        .controls { margin-top: 15px; display: flex; justify-content: center; gap: 15px; }
        button { padding: 12px 20px; font-size: 16px; cursor: pointer; border: none; border-radius: 8px; font-weight: bold; transition: background 0.2s; }
        #btn-next { background-color: #ffc107; color: #333; }
        #btn-next:hover { background-color: #e0a800; }
        #btn-end { background-color: #dc3545; color: white; }
        #btn-end:hover { background-color: #c82333; }
    </style>
</head>
<body>

    <div id="game-box">
        <h1>Drapeaux du Monde</h1>
        <div class="stats">Pays trouvés : <span id="score">0</span> / 196</div>
        <div id="progress-bar"><div id="progress-fill"></div></div>
        
        <div id="flag-container">
            <img id="flag-image" src="" alt="Drapeau">
        </div>
        
        <input type="text" id="guess-input" placeholder="Entrez le nom du pays..." autofocus autocomplete="off">
        <p id="message"></p>

        <div class="controls" id="controls">
            <button id="btn-next">Passer ⏭️</button>
            <button id="btn-end">Terminer le jeu 🛑</button>
        </div>
    </div>

    <script>
        const allCountries = [
            {name: "Afghanistan", code: "af"}, {name: "Afrique du Sud", code: "za"}, {name: "Albanie", code: "al"}, {name: "Algérie", code: "dz"}, {name: "Allemagne", code: "de"}, {name: "Andorre", code: "ad"}, {name: "Angola", code: "ao"}, {name: "Antigua-et-Barbuda", code: "ag"}, {name: "Arabie Saoudite", code: "sa"}, {name: "Argentine", code: "ar"}, {name: "Arménie", code: "am"}, {name: "Australie", code: "au"}, {name: "Autriche", code: "at"}, {name: "Azerbaïdjan", code: "az"}, {name: "Bahamas", code: "bs"}, {name: "Bahreïn", code: "bh"}, {name: "Bangladesh", code: "bd"}, {name: "Barbade", code: "bb"}, {name: "Belgique", code: "be"}, {name: "Belize", code: "bz"}, {name: "Bénin", code: "bj"}, {name: "Bhoutan", code: "bt"}, {name: "Biélorussie", code: "by"}, {name: "Birmanie", code: "mm"}, {name: "Bolivie", code: "bo"}, {name: "Bosnie-Herzégovine", code: "ba"}, {name: "Botswana", code: "bw"}, {name: "Brésil", code: "br"}, {name: "Brunei", code: "bn"}, {name: "Bulgarie", code: "bg"}, {name: "Burkina Faso", code: "bf"}, {name: "Burundi", code: "bi"}, {name: "Cambodge", code: "kh"}, {name: "Cameroun", code: "cm"}, {name: "Canada", code: "ca"}, {name: "Cap-Vert", code: "cv"}, {name: "Chili", code: "cl"}, {name: "Chine", code: "cn"}, {name: "Chypre", code: "cy"}, {name: "Colombie", code: "co"}, {name: "Comores", code: "km"}, {name: "Congo-Brazzaville", code: "cg"}, {name: "Congo-Kinshasa", code: "cd"}, {name: "Corée du Nord", code: "kp"}, {name: "Corée du Sud", code: "kr"}, {name: "Costa Rica", code: "cr"}, {name: "Côte d'Ivoire", code: "ci"}, {name: "Croatie", code: "hr"}, {name: "Cuba", code: "cu"}, {name: "Danemark", code: "dk"}, {name: "Djibouti", code: "dj"}, {name: "Dominique", code: "dm"}, {name: "Égypte", code: "eg"}, {name: "Émirats Arabes Unis", code: "ae"}, {name: "Équateur", code: "ec"}, {name: "Érythrée", code: "er"}, {name: "Espagne", code: "es"}, {name: "Estonie", code: "ee"}, {name: "Eswatini", code: "sz"}, {name: "États-Unis", code: "us"}, {name: "Éthiopie", code: "et"}, {name: "Fidji", code: "fj"}, {name: "Finlande", code: "fi"}, {name: "France", code: "fr"}, {name: "Gabon", code: "ga"}, {name: "Gambie", code: "gm"}, {name: "Géorgie", code: "ge"}, {name: "Ghana", code: "gh"}, {name: "Grèce", code: "gr"}, {name: "Grenade", code: "gd"}, {name: "Guatemala", code: "gt"}, {name: "Guinée", code: "gn"}, {name: "Guinée équatoriale", code: "gq"}, {name: "Guinée-Bissau", code: "gw"}, {name: "Guyana", code: "gy"}, {name: "Haïti", code: "ht"}, {name: "Honduras", code: "hn"}, {name: "Hongrie", code: "hu"}, {name: "Inde", code: "in"}, {name: "Indonésie", code: "id"}, {name: "Irak", code: "iq"}, {name: "Iran", code: "ir"}, {name: "Irlande", code: "ie"}, {name: "Islande", code: "is"}, {name: "Israël", code: "il"}, {name: "Italie", code: "it"}, {name: "Jamaïque", code: "jm"}, {name: "Japon", code: "jp"}, {name: "Jordanie", code: "jo"}, {name: "Kazakhstan", code: "kz"}, {name: "Kenya", code: "ke"}, {name: "Kirghizistan", code: "kg"}, {name: "Kiribati", code: "ki"}, {name: "Koweït", code: "kw"}, {name: "Laos", code: "la"}, {name: "Lesotho", code: "ls"}, {name: "Lettonie", code: "lv"}, {name: "Liban", code: "lb"}, {name: "Libéria", code: "lr"}, {name: "Libye", code: "ly"}, {name: "Liechtenstein", code: "li"}, {name: "Lituanie", code: "lt"}, {name: "Luxembourg", code: "lu"}, {name: "Macédoine du Nord", code: "mk"}, {name: "Madagascar", code: "mg"}, {name: "Malaisie", code: "my"}, {name: "Malawi", code: "mw"}, {name: "Maldives", code: "mv"}, {name: "Mali", code: "ml"}, {name: "Malte", code: "mt"}, {name: "Maroc", code: "ma"}, {name: "Marshall", code: "mh"}, {name: "Maurice", code: "mu"}, {name: "Mauritanie", code: "mr"}, {name: "Mexique", code: "mx"}, {name: "Micronésie", code: "fm"}, {name: "Moldavie", code: "md"}, {name: "Monaco", code: "mc"}, {name: "Mongolie", code: "mn"}, {name: "Monténégro", code: "me"}, {name: "Mozambique", code: "mz"}, {name: "Namibie", code: "na"}, {name: "Nauru", code: "nr"}, {name: "Népal", code: "np"}, {name: "Nicaragua", code: "ni"}, {name: "Niger", code: "ne"}, {name: "Nigeria", code: "ng"}, {name: "Norvège", code: "no"}, {name: "Nouvelle-Zélande", code: "nz"}, {name: "Oman", code: "om"}, {name: "Ouganda", code: "ug"}, {name: "Ouzbékistan", code: "uz"}, {name: "Pakistan", code: "pk"}, {name: "Palaos", code: "pw"}, {name: "Palestine", code: "ps"}, {name: "Panama", code: "pa"}, {name: "Papouasie-Nouvelle-Guinée", code: "pg"}, {name: "Paraguay", code: "py"}, {name: "Pays-Bas", code: "nl"}, {name: "Pérou", code: "pe"}, {name: "Philippines", code: "ph"}, {name: "Pologne", code: "pl"}, {name: "Portugal", code: "pt"}, {name: "Qatar", code: "qa"}, {name: "République Centrafricaine", code: "cf"}, {name: "République Dominicaine", code: "do"}, {name: "République Tchèque", code: "cz"}, {name: "Roumanie", code: "ro"}, {name: "Royaume-Uni", code: "gb"}, {name: "Russie", code: "ru"}, {name: "Rwanda", code: "rw"}, {name: "Saint-Christophe-et-Niévès", code: "kn"}, {name: "Sainte-Lucie", code: "lc"}, {name: "Saint-Marin", code: "sm"}, {name: "Saint-Vincent-et-les-Grenadines", code: "vc"}, {name: "Salomon", code: "sb"}, {name: "Salvador", code: "sv"}, {name: "Samoa", code: "ws"}, {name: "Sao Tomé-et-Principe", code: "st"}, {name: "Sénégal", code: "sn"}, {name: "Serbie", code: "rs"}, {name: "Seychelles", code: "sc"}, {name: "Sierra Leone", code: "sl"}, {name: "Singapour", code: "sg"}, {name: "Slovaquie", code: "sk"}, {name: "Slovénie", code: "si"}, {name: "Somalie", code: "so"}, {name: "Soudan", code: "sd"}, {name: "Soudan du Sud", code: "ss"}, {name: "Sri Lanka", code: "lk"}, {name: "Suède", code: "se"}, {name: "Suisse", code: "ch"}, {name: "Suriname", code: "sr"}, {name: "Syrie", code: "sy"}, {name: "Tadjikistan", code: "tj"}, {name: "Taïwan", code: "tw"}, {name: "Tanzanie", code: "tz"}, {name: "Tchad", code: "td"}, {name: "Thaïlande", code: "th"}, {name: "Timor oriental", code: "tl"}, {name: "Togo", code: "tg"}, {name: "Tonga", code: "to"}, {name: "Trinité-et-Tobago", code: "tt"}, {name: "Tunisie", code: "tn"}, {name: "Turkménistan", code: "tm"}, {name: "Turquie", code: "tr"}, {name: "Tuvalu", code: "tv"}, {name: "Ukraine", code: "ua"}, {name: "Uruguay", code: "uy"}, {name: "Vanuatu", code: "vu"}, {name: "Vatican", code: "va"}, {name: "Venezuela", code: "ve"}, {name: "Vietnam", code: "vn"}, {name: "Yémen", code: "ye"}, {name: "Zambie", code: "zm"}, {name: "Zimbabwe", code: "zw"}
        ];

        let remainingCountries = [...allCountries];
        let skippedCountries = []; // Nouvelle liste pour la boucle de fin
        let currentCountry = null;
        let score = 0;

        const flagImage = document.getElementById('flag-image');
        const guessInput = document.getElementById('guess-input');
        const scoreDisplay = document.getElementById('score');
        const messageDisplay = document.getElementById('message');
        const progressFill = document.getElementById('progress-fill');
        const controls = document.getElementById('controls');
        const btnNext = document.getElementById('btn-next');
        const btnEnd = document.getElementById('btn-end');

        function normalizeText(text) {
            return text.toLowerCase()
                       .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
                       .replace(/[^a-z0-9]/g, ""); 
        }

        // Fonction pour afficher l'écran de fin
        function endGame(victory = false) {
            flagImage.style.display = 'none';
            guessInput.style.display = 'none';
            controls.style.display = 'none';
            
            if (victory) {
                messageDisplay.textContent = "🏆 FÉLICITATIONS ! Vous avez trouvé les 196 drapeaux !";
                messageDisplay.style.color = "#28a745";
            } else {
                messageDisplay.textContent = `🛑 Jeu terminé. Vous connaissez ${score} drapeaux sur 196.`;
                messageDisplay.style.color = "#333";
            }
        }

        function loadNextFlag(isSkipped = false) {
            // Si le joueur clique sur "Passer", on garde le pays actuel pour la fin
            if (isSkipped && currentCountry !== null) {
                skippedCountries.push(currentCountry);
            }

            // Phase 1 : Tirage aléatoire tant qu'il reste des pays non vus
            if (remainingCountries.length > 0) {
                const randomIndex = Math.floor(Math.random() * remainingCountries.length);
                currentCountry = remainingCountries[randomIndex];
                remainingCountries.splice(randomIndex, 1);
            } 
            // Phase 2 : On boucle sur les pays ignorés dans l'ordre (avec .shift() on prend le premier de la file)
            else if (skippedCountries.length > 0) {
                currentCountry = skippedCountries.shift(); 
            } 
            // Phase 3 : Plus de pays restants et plus de pays ignorés = Victoire
            else {
                endGame(true);
                return;
            }

            // Affichage du nouveau drapeau
            flagImage.src = `https://flagcdn.com/w640/${currentCountry.code}.png`;
            guessInput.value = '';
            messageDisplay.textContent = '';
            
            // Réactiver les champs
            guessInput.disabled = false;
            btnNext.disabled = false;
            guessInput.focus();
        }

        // Événement 1 : Validation automatique pendant la frappe
        guessInput.addEventListener('input', (e) => {
            const userGuess = normalizeText(e.target.value);
            const correctAnswer = normalizeText(currentCountry.name);

            if (userGuess === correctAnswer) {
                score++;
                scoreDisplay.textContent = score;
                progressFill.style.width = (score / 196 * 100) + "%";
                
                messageDisplay.style.color = "#28a745";
                messageDisplay.textContent = `Excellent : ${currentCountry.name} !`;
                
                // Désactiver pendant le court chargement pour éviter les bugs
                guessInput.disabled = true;
                btnNext.disabled = true;
                currentCountry = null; // Empêche de l'ajouter aux pays passés si on spam clique
                
                setTimeout(() => loadNextFlag(false), 600);
            }
        });

        // Événement 2 : Appui sur la touche "Entrée" pour signaler une erreur
        guessInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const userGuess = normalizeText(e.target.value);
                const correctAnswer = normalizeText(currentCountry.name);
                
                // Si ce n'est pas vide et que c'est faux (si c'est bon, l'événement 'input' au-dessus s'en charge)
                if (userGuess !== correctAnswer && e.target.value.trim() !== "") {
                    messageDisplay.style.color = "#dc3545"; // Rouge
                    messageDisplay.textContent = "❌ Incorrect !";
                    // Le texte disparaîtra quand l'utilisateur cliquera sur "Passer" ou trouvera la réponse.
                }
            }
        });

        // Boutons
        btnNext.addEventListener('click', () => {
            loadNextFlag(true); // true = le pays est mis dans la file d'attente
        });

        btnEnd.addEventListener('click', () => {
            endGame(false); // false = on arrête avant d'avoir tout trouvé
        });

        // Démarrage
        loadNextFlag(false);
    </script>
</body>
</html>
